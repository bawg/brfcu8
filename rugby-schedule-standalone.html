<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rugby Schedule Tool - Barnes Rugby</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #0f172a;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            background: transparent;
        }
        
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin-bottom: 32px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.2);
            border: 1px solid #334155;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .tool-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.1), 0 2px 4px -1px rgba(30, 58, 138, 0.06);
            border: 1px solid #e2e8f0;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .section-title {
            color: #1e3a8a;
            font-size: 1.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: #64748b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: #475569;
        }
        
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .schedule-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        
        .schedule-card:hover {
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.1);
            transform: translateY(-2px);
        }
        
        .match-type {
            background: #1e3a8a;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }
        
        .match-date {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 8px;
        }
        
        .match-time {
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .match-teams {
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .match-location {
            color: #64748b;
            font-size: 14px;
        }
        
        .add-match-btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 24px;
        }
        
        .add-match-btn:hover {
            background: #1e40af;
        }
        
        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 60px 20px;
        }
        
        .empty-state h3 {
            margin-bottom: 12px;
            color: #1e3a8a;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .header {
                padding: 24px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .tool-section {
                padding: 24px;
            }
            
            .section-header {
                flex-direction: column;
                gap: 16px;
                align-items: stretch;
            }
            
            .schedule-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🏉 Rugby Schedule Tool</h1>
            <p>Manage matches, training sessions, and team events</p>
        </header>
        
        <div class="tool-section">
            <div class="section-header">
                <h2 class="section-title">📅 Upcoming Schedule</h2>
                <a href="index.html" class="back-btn">← Back to Platform</a>
            </div>
            
            <button class="add-match-btn" onclick="addMatch()">+ Add New Match/Event</button>
            
            <div id="schedule-container">
                <div class="schedule-grid" id="schedule-grid">
                    <!-- Sample matches will be populated here -->
                </div>
                
                <div class="empty-state" id="empty-state" style="display: none;">
                    <h3>No matches scheduled</h3>
                    <p>Click "Add New Match/Event" to get started</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Sample rugby schedule data
        let scheduleData = [
            {
                id: 1,
                type: 'League Match',
                date: 'Saturday, 15 Jan 2024',
                time: '15:00',
                teams: 'Barnes RFC vs Richmond FC',
                location: 'Barnes Rugby Ground',
                status: 'upcoming'
            },
            {
                id: 2,
                type: 'Training',
                date: 'Tuesday, 18 Jan 2024',
                time: '19:00',
                teams: 'Senior Squad Training',
                location: 'Barnes Rugby Ground',
                status: 'upcoming'
            },
            {
                id: 3,
                type: 'Friendly',
                date: 'Saturday, 22 Jan 2024',
                time: '14:30',
                teams: 'Barnes RFC vs Old Deer Park',
                location: 'Old Deer Park FC',
                status: 'upcoming'
            }
        ];
        
        function renderSchedule() {
            const grid = document.getElementById('schedule-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (scheduleData.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = scheduleData.map(match => `
                <div class="schedule-card">
                    <div class="match-type">${match.type}</div>
                    <div class="match-date">${match.date}</div>
                    <div class="match-time">⏰ ${match.time}</div>
                    <div class="match-teams">${match.teams}</div>
                    <div class="match-location">📍 ${match.location}</div>
                </div>
            `).join('');
        }
        
        function addMatch() {
            const newMatch = {
                id: scheduleData.length + 1,
                type: 'New Event',
                date: 'TBD',
                time: 'TBD',
                teams: 'New Match/Event',
                location: 'TBD',
                status: 'upcoming'
            };
            
            scheduleData.push(newMatch);
            renderSchedule();
            
            // Simple feedback
            alert('New match/event added! In a full implementation, this would open a detailed form.');
        }
        
        // Initialize the schedule on page load
        document.addEventListener('DOMContentLoaded', renderSchedule);
    </script>
</body>
</html>
